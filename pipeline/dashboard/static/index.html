<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Dashboard · Publishing Pipeline</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <header>
    <div class="brand">
      <h1>Review <em>Dashboard</em></h1>
      <span class="who muted">operator: <b id="operator" class="mono">—</b></span>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="select" id="tab-select">
        Select<span class="count" id="select-count"></span>
      </button>
      <button class="tab" data-view="approve" id="tab-approve">
        Approve<span class="count" id="approve-count"></span>
      </button>
    </nav>
  </header>

  <main>
    <!-- SELECT view: pick the day's 3–5 builds from validated candidates (CLAUDE §9.1) -->
    <section class="view" id="view-select">
      <div id="cap-banner"></div>
      <p class="cap-line" id="cap-line"></p>
      <div id="select-list"></div>
    </section>

    <!-- APPROVE view: release built products that passed both gates (CLAUDE §9.2) -->
    <section class="view" id="view-approve" hidden>
      <div id="approve-list"></div>
    </section>
  </main>

  <div class="toast" id="toast" hidden></div>

  <!-- Card templates -->
  <template id="tpl-select-card">
    <article class="card">
      <div class="card-head">
        <h2 class="sub-niche"></h2>
        <span class="chip channel"></span>
        <span class="chip score composite"></span>
      </div>
      <p class="kv"><b>Buyer:</b> <span class="buyer"></span></p>
      <p class="kv"><b>Gap:</b> <span class="gap"></span></p>
      <div class="weak">
        <div class="eyebrow">Incumbent weaknesses → our fixes</div>
        <ul class="weak-list"></ul>
      </div>
      <div class="actions">
        <button class="btn btn-primary act-select">Select to build</button>
        <button class="btn btn-ghost act-skip">Skip</button>
      </div>
    </article>
  </template>

  <template id="tpl-approve-card">
    <article class="card">
      <div class="card-head">
        <h2 class="title"></h2>
        <span class="chip channel"></span>
        <span class="chip score qscore"></span>
        <span class="chip attn attn-badge" hidden>Needs human attention</span>
      </div>
      <div class="rubric"></div>
      <div class="preview">
        <div class="interior"></div>
        <div class="cover"></div>
      </div>
      <div class="listings"></div>
      <div class="pkg kdp-pkg" hidden></div>
      <div class="actions">
        <button class="btn btn-primary act-approve">Approve</button>
        <button class="btn btn-ghost act-edit">Edit</button>
        <button class="btn btn-danger act-reject">Reject</button>
        <button class="btn btn-ghost act-kdp" hidden>Mark KDP published</button>
      </div>

      <!-- Edit form -->
      <div class="form form-edit" hidden>
        <div class="eyebrow">Edit listing (saved before approval)</div>
        <label>Title</label><input class="f-title" type="text">
        <label>Subtitle</label><input class="f-subtitle" type="text">
        <label>Description</label><textarea class="f-description"></textarea>
        <label>Keywords (comma-separated)</label><input class="f-keywords" type="text">
        <div class="actions">
          <button class="btn btn-primary act-edit-save">Save</button>
          <button class="btn btn-ghost act-edit-cancel">Cancel</button>
        </div>
      </div>

      <!-- Reject form -->
      <div class="form form-reject" hidden>
        <label>Reject reason <span class="req">*</span></label>
        <textarea class="f-reason" placeholder="Why is this not good enough to publish?"></textarea>
        <div class="actions">
          <button class="btn btn-danger act-reject-confirm">Confirm reject</button>
          <button class="btn btn-ghost act-reject-cancel">Cancel</button>
        </div>
      </div>

      <!-- KDP mark-published form -->
      <div class="form form-kdp" hidden>
        <div class="eyebrow">Mark KDP published (after your manual upload)</div>
        <label>ASIN <span class="req">*</span></label><input class="f-asin" type="text" placeholder="B0…">
        <label>Listing URL</label><input class="f-url" type="text" placeholder="https://www.amazon.com/dp/…">
        <label>Price</label><input class="f-price" type="number" step="0.01" placeholder="9.99">
        <div class="actions">
          <button class="btn btn-primary act-kdp-confirm" disabled>Write ledger row</button>
          <button class="btn btn-ghost act-kdp-cancel">Cancel</button>
        </div>
      </div>
    </article>
  </template>

  <script src="/static/dashboard.js"></script>
</body>
</html>
